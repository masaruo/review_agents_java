<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Java Code Review Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #1e1e2e; color: #cdd6f4; height: 100vh; display: flex; flex-direction: column; }

    header {
      background: #181825;
      padding: 12px 20px;
      border-bottom: 1px solid #313244;
      font-size: 1.1rem;
      font-weight: bold;
      color: #cba6f7;
    }

    .main { display: flex; flex: 1; overflow: hidden; }

    /* 左ペイン: 設定フォーム */
    .sidebar {
      width: 320px;
      min-width: 280px;
      background: #181825;
      border-right: 1px solid #313244;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .sidebar h2 { font-size: 0.85rem; color: #a6adc8; text-transform: uppercase; letter-spacing: 1px; }

    label { display: block; font-size: 0.85rem; color: #a6adc8; margin-bottom: 4px; }

    input[type="text"], select, textarea {
      width: 100%;
      background: #1e1e2e;
      border: 1px solid #45475a;
      border-radius: 6px;
      padding: 8px 10px;
      color: #cdd6f4;
      font-size: 0.9rem;
      outline: none;
    }
    input[type="text"]:focus, select:focus, textarea:focus { border-color: #cba6f7; }

    .agent-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .agent-item { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; }
    .agent-item input[type="checkbox"] { accent-color: #cba6f7; width: 14px; height: 14px; }

    button.primary {
      width: 100%;
      padding: 10px;
      background: #cba6f7;
      color: #1e1e2e;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.primary:hover { background: #b4befe; }
    button.primary:disabled { background: #45475a; color: #6c7086; cursor: not-allowed; }

    /* 右ペイン */
    .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* レビュー結果エリア */
    .review-area {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: #1e1e2e;
      border-bottom: 1px solid #313244;
    }
    .review-area h2 { font-size: 0.85rem; color: #a6adc8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.78rem;
      font-weight: bold;
      margin-bottom: 12px;
    }
    .status-running { background: #f9e2af22; color: #f9e2af; }
    .status-done    { background: #a6e3a122; color: #a6e3a1; }
    .status-error   { background: #f38ba822; color: #f38ba8; }

    pre.result-box {
      background: #181825;
      border: 1px solid #313244;
      border-radius: 8px;
      padding: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.85rem;
      line-height: 1.6;
    }

    .file-tab-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .file-tab {
      padding: 4px 10px;
      background: #313244;
      border-radius: 14px;
      font-size: 0.78rem;
      cursor: pointer;
      border: 1px solid transparent;
    }
    .file-tab.active { border-color: #cba6f7; color: #cba6f7; }

    /* チャットエリア */
    .chat-area {
      height: 280px;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      background: #181825;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg { max-width: 85%; padding: 8px 12px; border-radius: 10px; font-size: 0.88rem; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .msg.user { align-self: flex-end; background: #cba6f722; border: 1px solid #cba6f766; }
    .msg.assistant { align-self: flex-start; background: #313244; }
    .msg.streaming { opacity: 0.8; }

    .chat-input-row {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      border-top: 1px solid #313244;
    }
    .chat-input-row input {
      flex: 1;
      background: #1e1e2e;
      border: 1px solid #45475a;
      border-radius: 6px;
      padding: 8px 12px;
      color: #cdd6f4;
      font-size: 0.9rem;
      outline: none;
    }
    .chat-input-row input:focus { border-color: #cba6f7; }
    .chat-input-row button {
      padding: 8px 16px;
      background: #cba6f7;
      color: #1e1e2e;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }
    .chat-input-row button:disabled { background: #45475a; color: #6c7086; cursor: not-allowed; }

    .placeholder { color: #585b70; font-size: 0.9rem; }
  </style>
</head>
<body>
  <header>Java Code Review Agent</header>

  <div class="main">
    <!-- 左ペイン: 設定フォーム -->
    <div class="sidebar">
      <h2>設定</h2>

      <div>
        <label>プロジェクトディレクトリ</label>
        <input type="text" id="projectDir" placeholder="/path/to/java/project" />
      </div>

      <div>
        <label>スコープ</label>
        <select id="scope">
          <option value="full">Full review (全ファイル)</option>
          <option value="file">Specific file</option>
          <option value="class">Specific class</option>
          <option value="function">Specific function</option>
        </select>
      </div>

      <div id="scopeTargetWrap" style="display:none;">
        <label id="scopeTargetLabel">対象名</label>
        <input type="text" id="scopeTarget" placeholder="例: UserService.java" />
      </div>

      <div>
        <label>実行エージェント</label>
        <div class="agent-grid">
          <label class="agent-item"><input type="checkbox" value="bug_detector" checked /> Bug Detector</label>
          <label class="agent-item"><input type="checkbox" value="security_scanner" checked /> Security Scanner</label>
          <label class="agent-item"><input type="checkbox" value="efficiency_analyzer" /> Efficiency</label>
          <label class="agent-item"><input type="checkbox" value="design_critic" /> Design Critic</label>
          <label class="agent-item"><input type="checkbox" value="style_reviewer" /> Style Reviewer</label>
        </div>
      </div>

      <div>
        <label>フォーカス質問（任意）</label>
        <textarea id="focusQuestion" rows="3" placeholder="例: 認証フローの設計はどう思う？" style="resize:vertical;"></textarea>
      </div>

      <button class="primary" id="startBtn" onclick="startReview()">レビュー開始</button>
    </div>

    <!-- 右ペイン -->
    <div class="content">
      <!-- レビュー結果 -->
      <div class="review-area">
        <h2>レビュー結果</h2>
        <div id="reviewContent">
          <p class="placeholder">左のフォームでレビューを開始してください。</p>
        </div>
      </div>

      <!-- チャット -->
      <div class="chat-area">
        <div class="chat-messages" id="chatMessages">
          <p class="placeholder" style="margin: auto 0; text-align:center;">レビュー完了後に追加質問できます。</p>
        </div>
        <div class="chat-input-row">
          <input type="text" id="chatInput" placeholder="質問を入力…（例: このバグはどう修正する？）" disabled
            onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); sendChat(); }" />
          <button id="chatSendBtn" onclick="sendChat()" disabled>送信</button>
        </div>
      </div>
    </div>
  </div>

<script>
  let currentSessionId = null;
  let pollingTimer = null;
  let isChatting = false;

  // スコープ変更でターゲット入力を表示
  document.getElementById('scope').addEventListener('change', function() {
    const wrap = document.getElementById('scopeTargetWrap');
    const label = document.getElementById('scopeTargetLabel');
    const labels = { file: 'ファイル名', class: 'クラス名', function: 'メソッド名' };
    if (this.value === 'full') {
      wrap.style.display = 'none';
    } else {
      wrap.style.display = 'block';
      label.textContent = labels[this.value] || '対象名';
      document.getElementById('scopeTarget').placeholder = '';
    }
  });

  async function startReview() {
    const projectDir = document.getElementById('projectDir').value.trim();
    if (!projectDir) { alert('プロジェクトディレクトリを入力してください。'); return; }

    const scope = document.getElementById('scope').value;
    const scopeTarget = document.getElementById('scopeTarget').value.trim() || null;
    const focusQuestion = document.getElementById('focusQuestion').value.trim() || null;
    const enabledAgents = Array.from(
      document.querySelectorAll('.agent-grid input[type="checkbox"]:checked')
    ).map(cb => cb.value);

    if (enabledAgents.length === 0) { alert('エージェントを1つ以上選択してください。'); return; }

    // UI リセット
    document.getElementById('startBtn').disabled = true;
    document.getElementById('chatInput').disabled = true;
    document.getElementById('chatSendBtn').disabled = true;
    document.getElementById('chatMessages').innerHTML =
      '<p class="placeholder" style="margin:auto 0;text-align:center;">レビュー完了後に追加質問できます。</p>';
    currentSessionId = null;
    if (pollingTimer) { clearInterval(pollingTimer); pollingTimer = null; }

    showReviewStatus('running', 'レビューを開始しています...');

    try {
      const res = await fetch('/review', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ project_dir: projectDir, scope, scope_target: scopeTarget,
          enabled_agents: enabledAgents, focus_question: focusQuestion }),
      });
      if (!res.ok) {
        const err = await res.json();
        showReviewStatus('error', `エラー: ${err.detail}`);
        document.getElementById('startBtn').disabled = false;
        return;
      }
      const data = await res.json();
      currentSessionId = data.session_id;
      pollReview();
    } catch (e) {
      showReviewStatus('error', `通信エラー: ${e}`);
      document.getElementById('startBtn').disabled = false;
    }
  }

  function pollReview() {
    pollingTimer = setInterval(async () => {
      if (!currentSessionId) return;
      try {
        const res = await fetch(`/review/${currentSessionId}`);
        const data = await res.json();

        if (data.status === 'running') {
          showReviewStatus('running', '処理中... しばらくお待ちください。');
          return;
        }

        clearInterval(pollingTimer);
        pollingTimer = null;
        document.getElementById('startBtn').disabled = false;

        if (data.status === 'error') {
          showReviewStatus('error', `エラー: ${data.error}`);
          return;
        }

        // 完了: 結果を表示
        renderReviewResult(data);
        enableChat();
      } catch (e) {
        clearInterval(pollingTimer);
        showReviewStatus('error', `取得エラー: ${e}`);
        document.getElementById('startBtn').disabled = false;
      }
    }, 3000);
  }

  function showReviewStatus(status, message) {
    const statusLabels = { running: '実行中', done: '完了', error: 'エラー' };
    document.getElementById('reviewContent').innerHTML =
      `<span class="status-badge status-${status}">${statusLabels[status]}</span>` +
      `<pre class="result-box">${escapeHtml(message)}</pre>`;
  }

  function renderReviewResult(data) {
    const container = document.getElementById('reviewContent');
    let html = '<span class="status-badge status-done">完了</span>';

    // ファイルタブ
    const reports = data.file_reports || [];
    const summary = data.summary || '（サマリーなし）';

    const allItems = [{ filename: '全体サマリー', content: summary }, ...reports];

    html += '<div class="file-tab-bar">';
    allItems.forEach((r, i) => {
      html += `<div class="file-tab${i===0?' active':''}" onclick="switchTab(${i})">${escapeHtml(r.filename)}</div>`;
    });
    html += '</div>';

    allItems.forEach((r, i) => {
      html += `<pre class="result-box" id="tab-content-${i}" style="${i!==0?'display:none':''}">` +
              `${escapeHtml(r.content)}</pre>`;
    });

    container.innerHTML = html;
    container._tabData = allItems;
  }

  function switchTab(idx) {
    document.querySelectorAll('.file-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
    document.querySelectorAll('[id^="tab-content-"]').forEach((el, i) => {
      el.style.display = i === idx ? '' : 'none';
    });
  }

  function enableChat() {
    document.getElementById('chatInput').disabled = false;
    document.getElementById('chatSendBtn').disabled = false;
    const msgs = document.getElementById('chatMessages');
    msgs.innerHTML = '';
    appendMessage('assistant', 'レビューが完了しました。結果についてご質問があればどうぞ。');
  }

  async function sendChat() {
    if (!currentSessionId || isChatting) return;
    const input = document.getElementById('chatInput');
    const message = input.value.trim();
    if (!message) return;

    input.value = '';
    isChatting = true;
    document.getElementById('chatSendBtn').disabled = true;

    appendMessage('user', message);
    const assistantEl = appendMessage('assistant', '', true);

    try {
      const res = await fetch(`/chat/${currentSessionId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message }),
      });
      if (!res.ok) {
        assistantEl.textContent = `エラー: ${(await res.json()).detail}`;
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let fullText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() ?? '';
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6).trim();
          if (payload === '[DONE]') break;
          try {
            const obj = JSON.parse(payload);
            if (obj.delta) {
              fullText += obj.delta;
              assistantEl.textContent = fullText;
              assistantEl.classList.add('streaming');
              scrollChatToBottom();
            }
          } catch (_) {}
        }
      }
      assistantEl.classList.remove('streaming');
    } catch (e) {
      assistantEl.textContent = `通信エラー: ${e}`;
    } finally {
      isChatting = false;
      document.getElementById('chatSendBtn').disabled = false;
      input.focus();
    }
  }

  function appendMessage(role, text, streaming = false) {
    const msgs = document.getElementById('chatMessages');
    // プレースホルダーを除去
    const placeholder = msgs.querySelector('.placeholder');
    if (placeholder) placeholder.remove();

    const el = document.createElement('div');
    el.className = `msg ${role}${streaming ? ' streaming' : ''}`;
    el.textContent = text;
    msgs.appendChild(el);
    scrollChatToBottom();
    return el;
  }

  function scrollChatToBottom() {
    const msgs = document.getElementById('chatMessages');
    msgs.scrollTop = msgs.scrollHeight;
  }

  function escapeHtml(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
